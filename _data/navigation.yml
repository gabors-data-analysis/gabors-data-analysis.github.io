# Site navigation
#
# `main` drives the masthead (top) menu. Items with `children` render as
# dropdowns on desktop and as indented groups in the collapsed mobile menu.
# Parent items link to a real hub page, so navigation works without the dropdown.
#
# `sidebar` drives the grouped left-hand navigation shown on content pages
# (wired up via `sidebar: nav: "sidebar"` in _config.yml defaults).

